<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Stack Expression Evaluator</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="container">

    <h1>Stack Expression Evaluator</h1>
    <p class="subtitle">Type any math expression — watch the stack work step by step</p>

    <!-- INPUT ROW -->
    <div class="input-row">
      <input id="expr" type="text" value="3 + 5 * ( 2 - 1 )"
             placeholder="e.g.  3 + 5 * ( 2 - 1 )" />
      <button id="btn-visualize" onclick="startVisualize()">Visualize</button>
    </div>

    <!-- ERROR MESSAGE (hidden by default) -->
    <div id="error-box" class="error-box hidden"></div>

    <!-- TOKENS DISPLAY -->
    <div class="section" id="token-section">
      <div class="sec-label">Tokens (expression broken into parts)</div>
      <div id="tokens-row" class="tokens-row"></div>
    </div>

    <!-- PHASE BADGE -->
    <div id="phase-badge" class="phase-badge hidden"></div>

    <!-- TWO PANELS: stack + output -->
    <div class="panels" id="panels" style="display:none">

      <div class="panel">
        <div class="panel-title" id="stack-label">Operator stack</div>
        <div class="stack-vis" id="stack-vis"></div>
      </div>

      <div class="panel">
        <div class="panel-title" id="output-label">Output queue</div>
        <div class="output-row" id="output-vis"></div>
      </div>

    </div>

    <!-- STEP LOG -->
    <div class="step-log" id="step-log"></div>

    <!-- CONTROL BUTTONS -->
    <div class="controls" id="controls" style="display:none">
      <button onclick="stepBack()"  id="btn-prev">◀ Prev</button>
      <button onclick="stepForward()" id="btn-next">Next ▶</button>
      <button onclick="runAll()">Run All</button>
    </div>

    <!-- RESULT BOX (shown at end) -->
    <div class="result-box hidden" id="result-section">
      <div class="result-label">Final Answer</div>
      <div class="result-num" id="result-num"></div>
      <div class="postfix-str" id="postfix-display"></div>
    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
